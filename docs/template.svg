<svg xmlns="http://www.w3.org/2000/svg" width="820" height="470" viewBox="0 0 820 470" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <defs>
    <filter id="s2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="10" y="8" width="800" height="454" rx="10" fill="#0d1117" stroke="#30363d" filter="url(#s2)"/>

  <circle cx="36" cy="30" r="6" fill="#ff5f56"/>
  <circle cx="58" cy="30" r="6" fill="#ffbd2e"/>
  <circle cx="80" cy="30" r="6" fill="#27c93f"/>
  <text x="410" y="35" text-anchor="middle" fill="#6e7681" font-size="13">my-api/main.py</text>
  <line x1="10" y1="50" x2="810" y2="50" stroke="#21262d"/>

  <!-- gutter -->
  <rect x="10" y="51" width="40" height="411" fill="#0b0f14"/>
  <g fill="#484f58" text-anchor="end" font-size="13">
    <text x="42" y="84">1</text>
    <text x="42" y="110">2</text>
    <text x="42" y="136">3</text>
    <text x="42" y="162">4</text>
    <text x="42" y="188">5</text>
    <text x="42" y="214">6</text>
    <text x="42" y="240">7</text>
    <text x="42" y="266">8</text>
    <text x="42" y="292">9</text>
    <text x="42" y="318">10</text>
    <text x="42" y="344">11</text>
    <text x="42" y="370">12</text>
    <text x="42" y="396">13</text>
    <text x="42" y="422">14</text>
  </g>

  <g fill="#c9d1d9" xml:space="preserve">
    <text x="64" y="84" fill="#8b949e">"""Application template generated by crpr."""</text>

    <text x="64" y="136"><tspan fill="#ff7b72">def </tspan><tspan fill="#d2a8ff">greet</tspan><tspan>(name: </tspan><tspan fill="#79c0ff">str</tspan><tspan>) -&gt; </tspan><tspan fill="#79c0ff">str</tspan><tspan>:</tspan></text>
    <text x="64" y="162"><tspan>    </tspan><tspan fill="#ff7b72">return </tspan><tspan fill="#a5d6ff">f"Hello, {name}!"</tspan></text>

    <text x="64" y="214"><tspan fill="#ff7b72">def </tspan><tspan fill="#d2a8ff">sum_to</tspan><tspan>(n: </tspan><tspan fill="#79c0ff">int</tspan><tspan>) -&gt; </tspan><tspan fill="#79c0ff">int</tspan><tspan>:</tspan></text>
    <text x="64" y="240"><tspan>    </tspan><tspan fill="#ff7b72">return </tspan><tspan fill="#d2a8ff">sum</tspan><tspan>(</tspan><tspan fill="#d2a8ff">range</tspan><tspan>(</tspan><tspan fill="#79c0ff">1</tspan><tspan>, n + </tspan><tspan fill="#79c0ff">1</tspan><tspan>))</tspan></text>

    <text x="64" y="292"><tspan fill="#ff7b72">def </tspan><tspan fill="#d2a8ff">main</tspan><tspan>(argv: </tspan><tspan fill="#79c0ff">list</tspan><tspan>[</tspan><tspan fill="#79c0ff">str</tspan><tspan>]) -&gt; </tspan><tspan fill="#79c0ff">int</tspan><tspan>:</tspan></text>
    <text x="64" y="318"><tspan>    names = [</tspan><tspan fill="#a5d6ff">"world"</tspan><tspan>, </tspan><tspan fill="#a5d6ff">"Alice"</tspan><tspan>, </tspan><tspan fill="#a5d6ff">"Bob"</tspan><tspan>]</tspan></text>
    <text x="64" y="344"><tspan>    </tspan><tspan fill="#ff7b72">for </tspan><tspan>name </tspan><tspan fill="#ff7b72">in </tspan><tspan>names:</tspan></text>
    <text x="64" y="370"><tspan>        </tspan><tspan fill="#d2a8ff">print</tspan><tspan>(</tspan><tspan fill="#d2a8ff">greet</tspan><tspan>(name))</tspan></text>
    <text x="64" y="396"><tspan>    </tspan><tspan fill="#d2a8ff">print</tspan><tspan>(</tspan><tspan fill="#a5d6ff">f"The sum from 1 to 5 is {sum_to(5)}"</tspan><tspan>)</tspan></text>
    <text x="64" y="422"><tspan>    </tspan><tspan fill="#ff7b72">return </tspan><tspan fill="#79c0ff">0</tspan></text>
  </g>
</svg>
