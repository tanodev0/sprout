<svg xmlns="http://www.w3.org/2000/svg" width="820" height="372" viewBox="0 0 820 372" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- window -->
  <rect x="10" y="8" width="800" height="356" rx="10" fill="#0d1117" stroke="#30363d" filter="url(#shadow)"/>

  <!-- traffic lights -->
  <circle cx="36" cy="30" r="6" fill="#ff5f56"/>
  <circle cx="58" cy="30" r="6" fill="#ffbd2e"/>
  <circle cx="80" cy="30" r="6" fill="#27c93f"/>
  <text x="410" y="35" text-anchor="middle" fill="#6e7681" font-size="13">crpr — zsh</text>

  <!-- separator -->
  <line x1="10" y1="50" x2="810" y2="50" stroke="#21262d"/>

  <!-- session -->
  <text x="34" y="84"><tspan fill="#7ee787">$ </tspan><tspan fill="#d2a8ff">crpr </tspan><tspan fill="#79c0ff">my-api py</tspan></text>
  <text x="34" y="110" fill="#8b949e">Created folder: ~/Desktop/proyectos/my-api</text>
  <text x="34" y="136" fill="#8b949e">Generated 'py' template in: ~/Desktop/proyectos/my-api</text>

  <text x="34" y="188"><tspan fill="#7ee787">$ </tspan><tspan fill="#d2a8ff">cd </tspan><tspan fill="#79c0ff">my-api </tspan><tspan fill="#6e7681">&amp;&amp; </tspan><tspan fill="#d2a8ff">python3 </tspan><tspan fill="#79c0ff">main.py Charlie</tspan></text>
  <text x="34" y="214" fill="#e6edf3">Hello, world!</text>
  <text x="34" y="240" fill="#e6edf3">Hello, Alice!</text>
  <text x="34" y="266" fill="#e6edf3">Hello, Bob!</text>
  <text x="34" y="292" fill="#e6edf3">Hello, Charlie!</text>
  <text x="34" y="318" fill="#7ee787">The sum from 1 to 5 is 15</text>
  <text x="34" y="344"><tspan fill="#7ee787">$ </tspan><tspan fill="#6e7681">▋</tspan></text>
</svg>
